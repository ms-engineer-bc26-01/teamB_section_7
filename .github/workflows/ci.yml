name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 依存インストール
        run: pip install -r backend/requirements.txt
      - name: pytest 実行
        env:
          PYTHONPATH: backend
          MONGO_URI: mongodb://localhost:27017/potluck_test
          JWT_SECRET: test-secret
        run: pytest backend/tests/ -v

